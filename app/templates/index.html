<!DOCTYPE html>
<html>
<head>
    <title>AI DevOps App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background: #0f172a;
            color: white;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }
        h1 {
            color: #38bdf8;
        }
        .status {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 AI DevOps Mini Project</h1>
        <h2>Welcome, {{ name }} 👋</h2>

        <div class="status">
            Status: <strong>{{ status }}</strong>
        </div>

        <div class="status">
            AI Insight: <strong>{{ ai_result }}</strong>
        </div>
        <h3 style="margin-top: 30px;">📜 Recent Logs</h3>
        <div style="text-align:left; max-height:200px; overflow:auto; background:#111; padding:10px;">
            {% for log in logs %}
                <div>{{ log }}</div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
